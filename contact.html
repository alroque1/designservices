<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Design Services page for freelance designers wanting to have web presence.">
    <meta name="keywords" content="design, services, freelancers, design services, web design, UX/UI design, advertisement design">

    <title>Design Services | Home</title>
 
    <meta name="author" content="Angela Roque">
    <link rel="stylesheet" href="https://use.typekit.net/eks5cbg.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <header>
        <div class="container title">
            <div class="logo-and-title">
                <img src="images/web-logo-with-name.png" alt="Design Services Logo">
            </div>

            <nav class="navigation">
                <input type="checkbox" id="hamburger">
                <label for="hamburger"><span></span></label>
                    <ul class="dropdown-nav">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container project">
            <h1>Have a project in mind?</h1>
                <h2>Let's create something meaningful together and bring your ideas to life.</h2>
                    <a href="#" class="button">
                        <h3>View What I Do</h3>
                        <img src="images/right-arrow-icon.png" alt="orange arrow pointing right">
                    </a>
        </div>

        <section class="container form">
            <form class="contact-form" id="contact-form">
                <h2>Book a Table</h2>
                    <div class="field">
                        <img class="icon" src="" alt="">
                        <label for="name">Name*</label>
                        <input type="text" id="name" name="name" required placeholder="Name">
                    </div>

                    <div class="field">
                        <img class="icon" src="" alt="">
                        <label for="email">Email*</label>
                        <input type="email" id="email" name="email" required placeholder="Email">
                    </div>

                    <div class="field">
                        <img class="icon" src="" alt="">
                        <label for="message">Message*</label>
                        <input type="text" id="message" name="message" required placeholder="Message">
                    </div>

                    <div class="contact button">
                        <button type="submit">Book</button>
                        <img src="images/right-arrow-icon.png" alt="orange arrow pointing right">
                    </div>
            </form>
        </section>

    </main>

    <footer>
        <div class="container footer-layout">
               
            <div class="footer-left">
                <a href="contact.html">
                    <img src="images/web-logo-with-name.png" alt="DS logo">
                </a>
            </div>
        
            <div class="footer-center">
                <a href="contact.html">
                    <img src="images/web-name.png" alt="Design Services Name">
                </a>
            </div>
        
            <div class="footer-right">
                <div class="footer-block">
                    <a href="#"><img src="images/envelope-icon.png" alt="mail icon"></a>
                    <a href="#"><img src="images/instagram-icon.png" alt="instagram icon"></a>
                    <a href="#"><img src="images/linkedin-icon.png" alt="linkedin icon" width="32" height="32"></a>
                </div>
            </div>
                
        </div>
    </footer>

</body>

</html>
